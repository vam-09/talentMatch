<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Details - TalentMatch</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        :root {
            --primary-color: #007BFF;
            --bg-color: #f4f7f6;
            --font-family: 'Poppins', sans-serif;
        }
        body { font-family: var(--font-family); background-color: var(--bg-color); margin: 0; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        
        .profile-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }
        .profile-avatar {
            width: 80px;
            height: 80px;
            background: var(--primary-color);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 600;
        }
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .info-item label { display: block; color: #888; font-size: 0.85rem; margin-bottom: 5px; }
        .info-item p { margin: 0; color: #333; font-weight: 500; }
        
        .skills-section { margin-top: 30px; }
        .skills-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .skill-chip {
            background-color: #e7f3ff;
            color: var(--primary-color);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid #cce5ff;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
        /* Modal Styles */
         .modal-overlay {
             display: none;
             position: fixed;
             top: 0; left: 0; width: 100%; height: 100%;
             background: rgba(0,0,0,0.5);
             z-index: 2000;
             justify-content: center; align-items: center;
         }
         .modal-content {
             background: white;
             padding: 30px;
             border-radius: 12px;
             width: 90%; max-width: 500px;
         }
         .form-group { margin-bottom: 15px; }
         .form-group label { display: block; margin-bottom: 5px; font-weight: 500; }
         .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
         .btn {
             padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;
         }
         .btn-primary { background: var(--primary-color); color: white; }
         .btn-secondary { background: #6c757d; color: white; margin-right: 10px; }

        .back-btn:hover { color: var(--primary-color); }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div class="container">
        <a href="#" onclick="history.back()" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Applicants</a>
        
        <div class="profile-card">
            <div class="profile-header">
                <div class="profile-avatar" id="avatar-letter">U</div>
                <div>
                    <h1 style="margin:0">
                        <span id="user-firstName">Loading...</span> <span id="user-lastName"></span>
                    </h1>

                    <span id="user-role" style="color: var(--primary-color); font-size: 0.9rem; font-weight: 600;"></span>
                </div>
                <button id="edit-profile-btn" class="btn btn-primary" style="margin-left: auto; display: none;">Edit Profile</button>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <label>Email Address</label>
                    <p id="user-email">N/A</p>
                </div>
                <div class="info-item">
                    <label>Phone Number</label>
                    <p id="user-phone">N/A</p>
                </div>
            </div>

            <div class="skills-section">
                <label style="color: #888; font-size: 0.85rem;">Skills & Expertise</label>
                <div class="skills-container" id="user-skills">
                    <!-- Skills chips injected here -->
                </div>
            </div>
        </div>
    </div>
    <!-- Edit Profile Modal -->
    <div class="modal-overlay" id="edit-modal">
        <div class="modal-content">
            <h3>Edit Profile</h3>
            <form id="edit-user-form">
                <input type="hidden" id="edit-userId">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" id="edit-firstName">
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" id="edit-lastName">
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="text" id="edit-phone">
                </div>
                <div style="text-align: right; margin-top: 20px;">
                    <button type="button" class="btn btn-secondary" id="close-modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script>
       let currentUserData = null;

       async function initPage() {
           const navResponse = await fetch('/navbar.html');
           const navHtml = await navResponse.text();
           const placeholder = document.getElementById('navbar-placeholder');
           placeholder.innerHTML = navHtml;

           placeholder.querySelectorAll('script').forEach(oldScript => {
               const newScript = document.createElement('script');
               Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
               newScript.appendChild(document.createTextNode(oldScript.innerHTML));
               oldScript.parentNode.replaceChild(newScript, oldScript);
           });

           const urlParams = new URLSearchParams(window.location.search);
           const userName = urlParams.get('userName');
           if (userName) await fetchUserDetails(userName);

           // Check if this is the user's own profile
            try {
                const meRes = await fetch('/api/user/me');
                if (meRes.ok) {
                    const me = await meRes.json();
                    const loggedInUsername = me.userName || me.username;
                    
                    if (loggedInUsername && userName && loggedInUsername.toLowerCase() === userName.toLowerCase()) {
                        document.getElementById('edit-profile-btn').style.display = 'block';
                    }
                }
            } catch (err) { console.error("Error checking session:", err); }
       }

       async function fetchUserDetails(userName) {
           try {
               const response = await fetch(`/api/user?userName=${userName}`);
               if (response.ok) {
                   currentUserData = await response.json();
                   const user = currentUserData;
                   // Removed failing call to non-existent 'user-name' element
                   document.getElementById('user-firstName').innerText = user.firstName || user.userName || 'Unknown';
                   document.getElementById('user-lastName').innerText = user.lastName || '';
                   document.getElementById('user-email').innerText = user.email || 'N/A';
                   document.getElementById('user-phone').innerText = user.phoneNumber || 'N/A';
                   document.getElementById('user-role').innerText = user.role || 'APPLICANT';
                   document.getElementById('avatar-letter').innerText = (user.userName || 'U').charAt(0).toUpperCase();

                   const skillsDiv = document.getElementById('user-skills');
                   if (user.skills && user.skills.length > 0) {
                       skillsDiv.innerHTML = user.skills.map(s => `<span class="skill-chip">${s.skillName}</span>`).join('');
                   } else {
                       skillsDiv.innerHTML = '<p style="color:#999; font-size:0.9rem;">No skills listed</p>';
                   }
               }
           } catch (err) { console.error(err); }
       }

        // Modal Logic
         const modal = document.getElementById('edit-modal');
         document.getElementById('edit-profile-btn').onclick = () => {
             document.getElementById('edit-userId').value = currentUserData.userId;
             document.getElementById('edit-firstName').value = currentUserData.firstName || '';
             document.getElementById('edit-lastName').value = currentUserData.lastName || '';
             document.getElementById('edit-phone').value = currentUserData.phoneNumber || '';
             modal.style.display = 'flex';
         };

         document.getElementById('close-modal').onclick = () => modal.style.display = 'none';

         document.getElementById('edit-user-form').onsubmit = async (e) => {
             e.preventDefault();
             const updatedData = {
                 ...currentUserData,
                 firstName: document.getElementById('edit-firstName').value,
                 lastName: document.getElementById('edit-lastName').value,
                 phoneNumber: document.getElementById('edit-phone').value
             };

             const res = await fetch('/api/updateUser', {
                 method: 'POST',
                 headers: { 'Content-Type': 'application/json' },
                 body: JSON.stringify(updatedData)
             });

             if (res.ok) {
                 alert('Profile updated successfully!');
                 modal.style.display = 'none';
                 fetchUserDetails(currentUserData.userName);
             } else {
                 alert('Failed to update profile.');
             }
         };

       document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
