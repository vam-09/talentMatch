<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Registration - TalentMatch</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');

        :root {
            --primary-color: #007BFF;
            --primary-hover: #b3008c;
            --light-gray: #f0f2f5;
            --dark-gray: #555;
            --border-color: #ccc;
            --background-color: #ffffff;
            --success-color: #28a745;
            --font-family: 'Poppins', sans-serif;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--light-gray);
            margin: 0;
            padding: 0;
        }

        .main-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: calc(100vh - 80px);
            padding: 20px;
        }

        .registration-container {
            background-color: var(--background-color);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }

        .registration-container h1 {
            color: var(--dark-gray);
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .registration-container p {
            color: #777;
            text-align: center;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--dark-gray);
            font-weight: 500;
        }

        .form-group input[type="text"],
        .form-group input[type="email"],
        .form-group input[type="password"],
        .form-group input[type="file"] {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary-color);
        }

        .role-selection {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
        }

        .role-selection label {
            display: flex;
            align-items: center;
            cursor: pointer;
            padding: 12px 20px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            flex-grow: 1;
            justify-content: center;
            transition: all 0.3s;
        }

        .role-selection input[type="radio"] {
            display: none;
        }

        .role-selection input[type="radio"]:checked + label {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        #applicant-fields {
            display: none; /* Hidden by default */
            padding: 20px;
            border: 1px dashed var(--border-color);
            border-radius: 8px;
            margin-top: 20px;
        }

        .skills-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .skill-checkbox label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 400;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .submit-btn:hover {
            background-color: var(--primary-hover);
        }
    </style>
</head>
<body>

    <div id="navbar-placeholder"></div>

    <div class="main-container">
        <div class="registration-container">
            <h1>Create Your Account</h1>
            <p>Join TalentMatch to find your dream job or the perfect candidate.</p>

            <form id="registration-form">
                <!-- Basic User Fields -->
                <div class="form-group">
                    <label for="firstName">First Name</label>
                    <input type="text" id="firstName" name="firstName" required>
                </div>
                <div class="form-group">
                    <label for="lastName">Last Name</label>
                    <input type="text" id="lastName" name="lastName" required>
                </div>
                <div class="form-group">
                    <label for="userName">User Name</label>
                    <input type="text" id="userName" name="userName" required>
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="form-group">
                    <label for="phoneNumber">Phone Number</label>
                    <input type="text" id="phoneNumber" name="phoneNumber">
                </div>

                <!-- Role Selection -->
                <div class="form-group">
                    <label>I am a...</label>
                    <div class="role-selection">
                        <input type="radio" id="role-applicant" name="role" value="APPLICANT" onchange="handleRoleChange()">
                        <label for="role-applicant">Job Applicant</label>

                        <input type="radio" id="role-recruiter" name="role" value="RECRUITER" onchange="handleRoleChange()" checked>
                        <label for="role-recruiter">Recruiter</label>
                    </div>
                </div>

                <!-- Applicant-Specific Fields -->
                <div id="applicant-fields">
                    <div class="form-group">
                        <label for="resume">Upload Your Resume</label>
                        <input type="file" id="resume" name="resume">
                    </div>
                    <div class="form-group">
                        <label>Select Your Skills</label>
                        <div id="skills-list" class="skills-container">
                            <!-- Skills will be dynamically loaded here -->
                            <p>Loading skills...</p>
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn">Register</button>
            </form>
        </div>
    </div>

    <script>
        // Load Navbar
        fetch('/navbar.html')
            .then(response => response.text())
            .then(html => {
                const placeholder = document.getElementById('navbar-placeholder');
                placeholder.innerHTML = html;
                const scripts = placeholder.querySelectorAll('script');
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                    oldScript.parentNode.replaceChild(newScript, oldScript);
                });
            })
            .catch(error => console.error('Error loading navbar:', error));

        // Function to handle showing/hiding applicant-specific fields
        function handleRoleChange() {
            const applicantFields = document.getElementById('applicant-fields');
            const selectedRole = document.querySelector('input[name="role"]:checked').value;

            if (selectedRole === 'APPLICANT') {
                applicantFields.style.display = 'block';
            } else {
                applicantFields.style.display = 'none';
            }
        }

        // Function to fetch skills from the backend and populate the list
        async function fetchAndDisplaySkills() {
            const skillsListContainer = document.getElementById('skills-list');

            try {
                // Fetch the list of skills from the backend API
                const response = await fetch('/api/skills');

                if (!response.ok) {
                    throw new Error('Failed to fetch skills from the server.');
                }

                const skills = await response.json();

                skillsListContainer.innerHTML = ''; // Clear the "Loading..." text

                if (skills.length === 0) {
                    skillsListContainer.innerHTML = '<p>No skills available in the database.</p>';
                    return;
                }

                skills.forEach(skill => {
                    const skillDiv = document.createElement('div');
                    skillDiv.className = 'skill-checkbox';
                    skillDiv.innerHTML = `
                        <label>
                            <input type="checkbox" name="skills" value="${skill.skillId}">
                            ${skill.skillName}
                        </label>
                    `;
                    skillsListContainer.appendChild(skillDiv);
                });

            } catch (error) {
                skillsListContainer.innerHTML = '<p>Could not load skills (login required or server error).</p>';
                console.error('Failed to fetch skills:', error);
            }
        }

        // Handle form submission
        document.getElementById('registration-form').addEventListener('submit', async function(event) {
            event.preventDefault(); // Prevent the default form submission

            const formData = new FormData(this);
            const selectedRole = formData.get('role');

            // Collect selected skill objects (ID and Name)
            const skillCheckboxes = document.querySelectorAll('input[name="skills"]:checked');
            const selectedSkills = Array.from(skillCheckboxes).map(checkbox => ({
                skillId: parseInt(checkbox.value),
                skillName: checkbox.parentElement.textContent.trim()
            }));

            // Create a Nested JSON object
            const data = {
                user: {
                    userName: formData.get('userName'),
                    firstName: formData.get('firstName'),
                    lastName: formData.get('lastName'),
                    email: formData.get('email'),
                    phoneNumber: formData.get('phoneNumber'),
                    password: formData.get('password'),
                    role: selectedRole
                },
                skills: selectedRole === 'APPLICANT' ? selectedSkills : []
            };

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    alert('Registration successful! Click OK to proceed.');

                    if (selectedRole === 'APPLICANT') {
                        // Redirect to job list page
                        window.location.href = '/job-list.html';
                    } else {
                        // For recruiters, you might want to redirect elsewhere
                        window.location.href = '/login';
                    }
                } else {
                    const errorText = await response.text();
                    alert('Registration failed: ' + errorText);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('An error occurred during registration.');
            }
        });

        // Initial setup when the page loads
        document.addEventListener('DOMContentLoaded', () => {
            handleRoleChange(); // Set initial visibility based on default checked role
            fetchAndDisplaySkills(); // Fetch and display the skills list
        });
    </script>

</body>
</html>
