<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Details - TalentMatch</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap');
        :root {
            --primary-color: #007BFF;
            --bg-color: #f4f7f6;
            --font-family: 'Poppins', sans-serif;
        }
        body { font-family: var(--font-family); background-color: var(--bg-color); margin: 0; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        
        .job-card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid #eee;
            padding-bottom: 20px;
        }
        .job-header h1 { margin: 0; font-size: 1.8rem; color: #333; }
        .job-status { 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-size: 0.85rem; 
            font-weight: 600; 
            background: #e7f3ff; 
            color: var(--primary-color);
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .info-item label { display: block; color: #888; font-size: 0.85rem; margin-bottom: 5px; }
        .info-item p { margin: 0; color: #333; font-weight: 500; }
        .info-item.full-width { grid-column: span 2; }

        .skills-section { margin-top: 20px; }
        .skills-container { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px; }
        .skill-chip {
            background-color: #e7f3ff;
            color: var(--primary-color);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 500;
            border: 1px solid #cce5ff;
        }
        .job-description-content {
            white-space: pre-wrap;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            color: #444;
            line-height: 1.6;
            font-size: 0.95rem;
        }
        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #666;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-btn:hover { color: var(--primary-color); }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div class="container">
        <a href="#" onclick="history.back()" class="back-btn"><i class="fas fa-arrow-left"></i> Back</a>
        
        <div class="job-card">
            <div class="job-header">
                <h1 id="job-title-display">Loading Job Details...</h1>
                <span class="job-status" id="job-status-display"></span>
            </div>

            <div class="info-grid">
                <div class="info-item">
                    <label>Company Name</label>
                    <p id="job-company"></p>
                </div>
                <div class="info-item">
                    <label>Location</label>
                    <p id="job-location"></p>
                </div>
                <div class="info-item">
                    <label>CTC (Salary)</label>
                    <p id="job-ctc"></p>
                </div>
                <div class="info-item">
                    <label>Work Model</label>
                    <p id="job-work-model"></p>
                </div>
                <div class="info-item">
                    <label>Shift</label>
                    <p id="job-shift"></p>
                </div>
                <div class="info-item">
                    <label>Experience</label>
                    <p id="job-experience"></p>
                </div>
                <div class="info-item">
                    <label>Education Requirement</label>
                    <p id="job-education"></p>
                </div>
                <div class="info-item">
                    <label>Application Deadline</label>
                    <p id="job-deadline"></p>
                </div>
                <div class="info-item full-width skills-section">
                    <label>Required Skills</label>
                    <div class="skills-container" id="job-skills"></div>
                </div>
                <div class="info-item full-width">
                    <label>Job Description</label>
                    <div class="job-description-content" id="job-description"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        async function initPage() {
            // Load Navbar dynamically to match job-list and my-applications
             const navResponse = await fetch('/navbar.html');
             const navHtml = await navResponse.text();
             const placeholder = document.getElementById('navbar-placeholder');
             placeholder.innerHTML = navHtml;

             // Manually re-execute scripts in the loaded navbar to handle role-based logic
             placeholder.querySelectorAll('script').forEach(oldScript => {
                 const newScript = document.createElement('script');
                 Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                 newScript.appendChild(document.createTextNode(oldScript.innerHTML));
                 oldScript.parentNode.replaceChild(newScript, oldScript);
             });

            const urlParams = new URLSearchParams(window.location.search);
            const jobId = urlParams.get('jobId');

            if (jobId) {
                fetchJobDetails(jobId);
            } else {
                document.getElementById('job-title-display').innerText = "Job Not Found";
                document.getElementById('job-status-display').innerText = "Error";
            }
        }

        async function fetchJobDetails(jobId) {
            try {
                const response = await fetch(`/api/job?id=${jobId}`); // Assuming API endpoint /api/job?id={jobId}
                if (response.ok) {
                    const job = await response.json();
                    document.getElementById('job-title-display').innerText = job.jobTitle || 'N/A';
                    document.getElementById('job-status-display').innerText = job.jobStatus || 'OPEN';
                    document.getElementById('job-company').innerText = job.companyName || 'N/A';
                    document.getElementById('job-location').innerText = job.location || 'N/A';
                    document.getElementById('job-ctc').innerText = job.ctc || 'N/A';
                    document.getElementById('job-work-model').innerText = job.workModel || 'N/A';
                    document.getElementById('job-shift').innerText = job.shift || 'N/A';
                    document.getElementById('job-experience').innerText = job.experience || 'N/A';
                    document.getElementById('job-education').innerText = job.educationRequirement || 'N/A';
                    document.getElementById('job-deadline').innerText = job.applicationDeadline ? new Date(job.applicationDeadline).toLocaleDateString() : 'N/A';
                    document.getElementById('job-description').innerText = job.jobDescription || 'N/A';

                    const skillsContainer = document.getElementById('job-skills');
                    skillsContainer.innerHTML = '';
                    if (job.requiredSkills) {
                        job.requiredSkills.split(',').forEach(skill => {
                            const trimmedSkill = skill.trim();
                            if (trimmedSkill) {
                                skillsContainer.innerHTML += `<span class="skill-chip">${trimmedSkill}</span>`;
                            }
                        });
                    } else {
                        skillsContainer.innerHTML = '<p style="color:#999; font-size:0.9rem;">No skills specified</p>';
                    }

                } else {
                    document.getElementById('job-title-display').innerText = "Job Not Found";
                    document.getElementById('job-status-display').innerText = "Error";
                }
            } catch (error) {
                console.error("Error fetching job details:", error);
                document.getElementById('job-title-display').innerText = "Error Loading Job";
                document.getElementById('job-status-display').innerText = "Error";
            }
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
